name: Build F3MB0Y APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libffi-dev python3-dev automake autoconf libltdl-dev libtool pkg-config zlib1g-dev adb openjdk-17-jdk zip unzip
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer  # Paksa Cython versi lama biar stabil

      - name: Set Java Home
        run: echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV

      - name: Build APK
        run: |
          # JANGAN pake 'yes |', Buildozer terbaru kadang crash kalo di-pipe gitu
          # Kita pake flag --accept-sdk-license bawaan buildozer
          buildozer -v android debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_START_WITH_DIGIT: 1
          # Otomatis setuju lisensi tanpa 'yes |'
          APP_ANDROID_ACCEPT_SDK_LICENSE: "True"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: F3MB0Y-Payload-Final
          path: bin/*.apk
